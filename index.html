<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GCP対象商品検索</title>

<!-- PWA設定 -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">

<style>
body {
    background: #f2f2f7;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    padding: 20px;
    color: #333;
}

.label {
    font-size: 14px;
    color: #555;
    margin-bottom: 6px;
}

.input-area {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
}

#jan {
    flex: 1;
    padding: 12px 14px;
    font-size: 18px;
    border: 1px solid #ccc;
    border-radius: 10px;
    background: #fff;
    outline: none;
}

#jan:focus {
    border-color: #007aff;
}

#resetBtn {
    background: none;
    border: none;
    color: #007aff;
    font-size: 16px;
    padding: 8px 10px;
    border-radius: 8px;
}

#resetBtn:active {
    background: rgba(0, 122, 255, 0.1);
}

.result-card {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-top: 10px;
    border: 1px solid #e5e5ea;
}

.result-item {
    font-size: 16px;
    padding: 6px 0;
    border-bottom: 1px solid #eee;
}

.result-item:last-child {
    border-bottom: none;
}
</style>
</head>

<body>

<h2>GCP商品検索</h2>

<div class="label">JANコード</div>

<div class="input-area">
    <input type="text" id="jan" placeholder="JANコードを入力">
    <button id="resetBtn">リセット</button>
</div>

<div id="result"></div>

<script>
// CSVデータ格納用
let csvData = [];

// 全角→半角変換
function toHalfWidth(str) {
    return str.replace(/[！-～]/g, s =>
        String.fromCharCode(s.charCodeAt(0) - 0xFEE0)
    );
}

// CSV読み込み（JAN列をtrimして正規化）
fetch("master.csv")
    .then(res => res.text())
    .then(text => {
        csvData = text.split("\n").map(row => {
            const cols = row.split(",");
            cols[0] = toHalfWidth(cols[0].trim()); // ← JANの空白除去＋全角→半角
            return cols;
        });
    });

// 入力イベント
document.getElementById("jan").addEventListener("input", () => {
    const raw = document.getElementById("jan").value;
    const jan = toHalfWidth(raw.trim()); // ← 入力側も正規化
    searchJAN(jan);
});

// 検索処理
function searchJAN(jan) {
    const resultArea = document.getElementById("result");
    resultArea.innerHTML = "";

    if (jan === "") return;

    const hit = csvData.find(row => row[0] === jan);

    if (!hit) {
        resultArea.innerHTML = `<div class="result-card">該当なし</div>`;
        return;
    }

    resultArea.innerHTML = `
        <div class="result-card">
            <div class="result-item">商品名：${hit[1]}</div>
            <div class="result-item">規格：${hit[2]}</div>
            <div class="result-item">値引：${hit[3]}</div>
            <div class="result-item">期間：${hit[4]}</div>
        </div>
    `;
}

// リセットボタン（キーボード非表示）
document.getElementById("resetBtn").addEventListener("click", () => {
    const input = document.getElementById("jan");
    input.value = "";
    document.getElementById("result").innerHTML = "";
    keepFocusWithoutKeyboard(input);
});

// キーボードを出さずにフォーカス維持
function keepFocusWithoutKeyboard(input) {
    input.readOnly = true;
    input.focus();
    setTimeout(() => {
        input.readOnly = false;
    }, 50);
}

// PWA Service Worker登録
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
